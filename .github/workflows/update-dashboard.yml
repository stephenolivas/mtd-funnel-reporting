name: Update MTD Funnel Dashboard

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch data from Close API
        env:
          CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: python3 -u scripts/fetch_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json archives/
          git diff --staged --quiet || git commit -m "📊 Update funnel data - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase -X theirs origin main || true
          git push
