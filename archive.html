<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTD Dashboard Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --light: #9ca3af;
      --blue: #3b82f6;
      --blue-light: #eff6ff;
      --green: #22c55e;
      --green-light: #f0fdf4;
      --amber: #f59e0b;
      --amber-light: #fffbeb;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    }

    body {
      font-family: 'Figtree', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    .container { max-width: 720px; margin: 0 auto; }

    .header { margin-bottom: 24px; }
    .header h1 { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.02em; }
    .header-meta { margin-top: 4px; font-size: 0.8125rem; color: var(--muted); }
    .header-nav { margin-top: 10px; }
    .nav-link {
      font-size: 0.8rem; font-weight: 500; color: var(--blue);
      text-decoration: none; padding: 3px 10px;
      border: 1px solid #dbeafe; border-radius: 999px;
      background: var(--blue-light); transition: background 0.15s;
    }
    .nav-link:hover { background: #dbeafe; }

    .archive-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 540px) { .archive-grid { grid-template-columns: 1fr; } }

    .archive-section {
      background: var(--card);
      border-radius: 16px;
      padding: 18px 20px;
      box-shadow: var(--shadow);
    }
    .archive-section h2 {
      font-size: 0.8125rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .archive-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .archive-item {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.1s, border-color 0.1s;
    }
    .archive-item:hover { background: var(--blue-light); border-color: #dbeafe; }
    .archive-item.active { background: var(--blue-light); border-color: #93c5fd; }
    .archive-item .key {
      font-size: 0.875rem; font-weight: 600; color: var(--text); flex: 1;
    }
    .archive-item .badge-small {
      font-size: 0.6875rem; color: var(--muted); font-weight: 500;
    }

    .snapshot-panel {
      margin-top: 20px;
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow);
      display: none;
    }
    .snapshot-panel.visible { display: block; }
    .snapshot-panel h2 {
      font-size: 1.125rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .snapshot-panel .sub {
      font-size: 0.8125rem; color: var(--muted); margin-bottom: 16px;
    }

    .summary-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    @media (max-width: 540px) { .summary-strip { grid-template-columns: repeat(2, 1fr); } }
    .stat-card {
      background: #f9fafb; border-radius: 10px; padding: 10px 12px;
    }
    .stat-card .label { font-size: 0.625rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 2px; }
    .stat-card .value { font-size: 1.375rem; font-weight: 800; letter-spacing: -0.02em; color: var(--blue); }

    .funnel-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; margin-top: 8px; }
    .funnel-table th {
      text-align: left; font-size: 0.625rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--muted); padding: 6px 8px; border-bottom: 1px solid var(--border);
    }
    .funnel-table td { padding: 7px 8px; border-bottom: 1px solid #f3f4f6; }
    .funnel-table tr:last-child td { border-bottom: none; }
    .funnel-table td:first-child { font-weight: 600; color: var(--text); }
    .funnel-table td:not(:first-child) { text-align: right; color: var(--muted); }
    .funnel-table td.highlight { color: var(--text); font-weight: 600; }

    .loading { text-align: center; padding: 40px 0; color: var(--muted); font-size: 0.9375rem; }
    .error-box { background: #fef2f2; color: #ef4444; border-radius: 10px; padding: 14px; font-size: 0.875rem; margin-top: 12px; }

    .section-label-sm {
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.07em; color: var(--muted); margin: 14px 0 6px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Dashboard Archive</h1>
    <div class="header-meta">Historical MTD funnel snapshots</div>
    <div class="header-nav" style="margin-top:10px">
      <a class="nav-link" href="index.html">← Live Dashboard</a>
    </div>
  </div>

  <div id="archive-grid-wrap">
    <div class="loading">Loading archive index…</div>
  </div>

  <div class="snapshot-panel" id="snapshot-panel">
    <h2 id="snapshot-title">Snapshot</h2>
    <div class="sub" id="snapshot-sub"></div>
    <div id="snapshot-body"></div>
  </div>
</div>

<script>
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function fmtNum(n) { return n == null ? "—" : Number(n).toLocaleString(); }

function fmtWeekLabel(key) {
  // key = "2026-03-09" (Monday's date)
  const d = new Date(key + "T12:00:00Z");
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}
function fmtMonthLabel(key) {
  const [y, m] = key.split("-");
  return new Date(Number(y), Number(m) - 1, 1).toLocaleDateString("en-US", { month: "long", year: "numeric" });
}

let activeItem = null;

function setActive(el) {
  if (activeItem) activeItem.classList.remove("active");
  el.classList.add("active");
  activeItem = el;
}

async function loadSnapshot(path, title, sub) {
  const panel = document.getElementById("snapshot-panel");
  const body  = document.getElementById("snapshot-body");
  document.getElementById("snapshot-title").textContent = title;
  document.getElementById("snapshot-sub").textContent   = sub;
  body.innerHTML = `<div class="loading">Loading…</div>`;
  panel.classList.add("visible");
  panel.scrollIntoView({ behavior: "smooth", block: "nearest" });

  let d;
  try {
    const resp = await fetch(`${path}?_=${Date.now()}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    d = await resp.json();
  } catch (e) {
    body.innerHTML = `<div class="error-box">Could not load snapshot: ${e.message}</div>`;
    return;
  }

  const s = d.summary || {};
  const goals = d.goals || {};
  const fcByFunnel = d.first_calls?.by_funnel || {};
  const sdByFunnel = d.setter_discovery?.by_funnel || {};

  let html = `
    <div class="summary-strip">
      <div class="stat-card"><div class="label">MTD Booked</div><div class="value">${fmtNum(s.mtd_booked)}</div></div>
      <div class="stat-card"><div class="label">On-Pace</div><div class="value">${fmtNum(s.on_pace)}</div></div>
      <div class="stat-card"><div class="label">Remaining</div><div class="value">${fmtNum(s.remaining)}</div></div>
      <div class="stat-card"><div class="label">EOM Proj.</div><div class="value">${fmtNum(s.eom_projection)}</div></div>
    </div>`;

  // First calls table
  const fcRows = Object.entries(fcByFunnel).sort((a, b) => (b[1].total||0) - (a[1].total||0));
  if (fcRows.length) {
    html += `<div class="section-label-sm">First Calls by Funnel</div>
    <table class="funnel-table">
      <thead><tr><th>Funnel</th><th>Total</th><th>Sales</th><th>Setter</th><th>Goal</th></tr></thead>
      <tbody>`;
    for (const [f, v] of fcRows) {
      html += `<tr>
        <td>${escHtml(f)}</td>
        <td class="highlight">${fmtNum(v.total)}</td>
        <td>${fmtNum(v.sales)}</td>
        <td>${fmtNum(v.setter)}</td>
        <td>${goals[f] ? fmtNum(goals[f]) : "—"}</td>
      </tr>`;
    }
    html += `</tbody></table>`;
  }

  // Setter table
  const sdRows = Object.entries(sdByFunnel).sort((a, b) => (b[1].total||0) - (a[1].total||0));
  if (sdRows.length) {
    html += `<div class="section-label-sm" style="margin-top:14px">Setter / Discovery by Funnel</div>
    <table class="funnel-table">
      <thead><tr><th>Funnel</th><th>Total</th></tr></thead>
      <tbody>`;
    for (const [f, v] of sdRows) {
      html += `<tr><td>${escHtml(f)}</td><td class="highlight">${fmtNum(v.total)}</td></tr>`;
    }
    html += `</tbody></table>`;
  }

  body.innerHTML = html;
}

async function init() {
  let index;
  try {
    const resp = await fetch(`archives/index.json?_=${Date.now()}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    index = await resp.json();
  } catch (e) {
    document.getElementById("archive-grid-wrap").innerHTML =
      `<div class="error-box">Could not load archive index: ${e.message}</div>`;
    return;
  }

  const weeks  = (index.weeks  || []).sort().reverse();
  const months = (index.months || []).sort().reverse();

  function buildList(items, type) {
    if (!items.length) return `<p style="font-size:.875rem;color:var(--muted)">No ${type} archives yet.</p>`;
    let html = `<ul class="archive-list">`;
    for (const key of items) {
      const label = type === "week" ? `Week of ${fmtWeekLabel(key)}` : fmtMonthLabel(key);
      const path  = type === "week" ? `archives/data_week_${key}.json` : `archives/data_month_${key}.json`;
      const badge = type === "week" ? "Weekly" : "Monthly";
      html += `<li class="archive-item" data-path="${path}" data-title="${escHtml(label)}" data-sub="${badge} snapshot · ${key}">
        <span class="key">${escHtml(label)}</span>
        <span class="badge-small">${badge}</span>
      </li>`;
    }
    return html + `</ul>`;
  }

  document.getElementById("archive-grid-wrap").innerHTML = `
    <div class="archive-grid">
      <div class="archive-section">
        <h2>Weekly Snapshots</h2>
        ${buildList(weeks, "week")}
      </div>
      <div class="archive-section">
        <h2>Monthly Snapshots</h2>
        ${buildList(months, "month")}
      </div>
    </div>`;

  // Attach click handlers
  document.querySelectorAll(".archive-item").forEach(el => {
    el.addEventListener("click", () => {
      setActive(el);
      loadSnapshot(el.dataset.path, el.dataset.title, el.dataset.sub);
    });
  });

  // Auto-load most recent if present
  const first = document.querySelector(".archive-item");
  if (first) first.click();
}

init();
</script>
</body>
</html>
