<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTD Funnel Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --light: #9ca3af;
      --blue: #3b82f6;
      --blue-light: #eff6ff;
      --green: #22c55e;
      --green-light: #f0fdf4;
      --amber: #f59e0b;
      --amber-light: #fffbeb;
      --purple: #8b5cf6;
      --purple-light: #f5f3ff;
      --indigo: #6366f1;
      --indigo-light: #eef2ff;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    }

    body {
      font-family: 'Figtree', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    .container { max-width: 720px; margin: 0 auto; }

    /* ── Header ── */
    .header { margin-bottom: 20px; }
    .header h1 { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.02em; }
    .header-meta { margin-top: 4px; font-size: 0.8125rem; color: var(--muted); display: flex; flex-wrap: wrap; gap: 0 6px; }
    .header-meta .sep { color: var(--border); }
    .header-nav { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
    .nav-link {
      font-size: 0.8rem; font-weight: 500; color: var(--blue);
      text-decoration: none; padding: 3px 10px;
      border: 1px solid #dbeafe; border-radius: 999px;
      background: var(--blue-light); transition: background 0.15s;
    }
    .nav-link:hover { background: #dbeafe; }

    /* ── Summary strip — row 1: 4 pace tiles ── */
    .summary-strip {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 10px; margin-bottom: 10px;
    }
    @media (max-width: 560px) { .summary-strip { grid-template-columns: repeat(2, 1fr); } }

    .stat-card {
      background: var(--card); border-radius: 14px;
      padding: 14px 16px 12px; box-shadow: var(--shadow);
    }
    .stat-card .label {
      font-size: 0.6875rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--muted); margin-bottom: 4px;
    }
    .stat-card .value { font-size: 1.875rem; font-weight: 800; line-height: 1; letter-spacing: -0.02em; }
    .stat-card .sub   { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .val-blue   { color: var(--blue); }
    .val-green  { color: var(--green); }
    .val-amber  { color: var(--amber); }
    .val-purple { color: var(--purple); }
    .val-indigo { color: var(--indigo); }

    /* ── Summary strip — row 2: in-house/external + rates ── */
    .summary-strip-2 {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 10px; margin-bottom: 20px;
    }
    @media (max-width: 640px) { .summary-strip-2 { grid-template-columns: repeat(2, 1fr); } }

    .stat-card-sm {
      background: var(--card); border-radius: 12px;
      padding: 11px 14px 10px; box-shadow: var(--shadow);
    }
    .stat-card-sm .label {
      font-size: 0.625rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--muted); margin-bottom: 3px;
    }
    .stat-card-sm .value { font-size: 1.25rem; font-weight: 800; line-height: 1; letter-spacing: -0.01em; }
    .stat-card-sm .sub   { font-size: 0.6875rem; color: var(--muted); margin-top: 2px; }

    /* rate divider line between in/ex */
    .stat-card-sm .rate-row {
      display: flex; gap: 6px; align-items: baseline; margin-top: 2px;
    }
    .stat-card-sm .rate-item { font-size: 0.6875rem; color: var(--muted); }
    .stat-card-sm .rate-item span { font-weight: 700; color: var(--text); }
    .stat-card-sm .rate-divider { width: 1px; height: 10px; background: var(--border); }

    /* ── Section header ── */
    .section-label {
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--muted); margin: 24px 0 10px;
    }

    /* ── Funnel card ── */
    .funnel-card {
      background: var(--card); border-radius: 16px;
      padding: 18px 20px 14px; box-shadow: var(--shadow); margin-bottom: 10px;
    }
    .funnel-card-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 8px; margin-bottom: 2px;
    }
    .funnel-name { font-size: 1rem; font-weight: 700; color: var(--text); }

    /* ── Badges ── */
    .badge {
      flex-shrink: 0; font-size: 0.6875rem; font-weight: 700;
      padding: 3px 10px; border-radius: 999px; white-space: nowrap;
    }
    .badge-behind { background: var(--amber-light); color: #92400e; }
    .badge-onpace { background: var(--blue-light);  color: #1d4ed8; }
    .badge-hit    { background: var(--green-light); color: #15803d; }
    .badge-nogoal { background: #f3f4f6; color: var(--muted); }

    /* ── Progress bar ── */
    .progress-wrap {
      position: relative; height: 8px; background: #f3f4f6;
      border-radius: 999px; margin: 10px 0 12px; overflow: visible;
    }
    .progress-fill { height: 100%; border-radius: 999px; min-width: 4px; }
    .fill-blue   { background: var(--blue); }
    .fill-green  { background: var(--green); }
    .fill-amber  { background: var(--amber); }
    .fill-gray   { background: #d1d5db; }
    .pace-tick {
      position: absolute; top: -3px; width: 2px; height: 14px;
      background: #9ca3af; border-radius: 1px; transform: translateX(-50%);
    }

    /* ── Stats row (pace stats) ── */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); }
    .stats-row .stat-lbl {
      font-size: 0.6875rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--muted); margin-bottom: 1px;
    }
    .stats-row .stat-val {
      font-size: 1.25rem; font-weight: 800; letter-spacing: -0.01em; line-height: 1.1;
    }
    .col-amber  { color: var(--amber); }
    .col-blue   { color: var(--blue); }
    .col-green  { color: var(--green); }
    .col-muted  { color: var(--muted); }
    .col-plain  { color: var(--text); }

    /* ── Conversion row ── */
    .conv-row {
      display: flex; gap: 0;
      border-top: 1px solid #f3f4f6;
      margin-top: 12px; padding-top: 10px;
    }
    .conv-item {
      flex: 1; display: flex; flex-direction: column; align-items: flex-start;
      padding-right: 12px; border-right: 1px solid #f3f4f6;
    }
    .conv-item:last-child { border-right: none; padding-right: 0; padding-left: 12px; flex: none; }
    .conv-item:not(:first-child):not(:last-child) { padding-left: 12px; }
    .conv-item:first-child { padding-left: 0; }
    .conv-lbl {
      font-size: 0.625rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--muted); margin-bottom: 2px;
    }
    .conv-val { font-size: 0.9375rem; font-weight: 700; color: var(--text); }
    .conv-pct { font-size: 0.75rem; font-weight: 500; color: var(--muted); margin-left: 3px; }
    .conv-sep  { font-size: 0.75rem; color: #d1d5db; margin: 0 5px; }
    .conv-val.show-color { color: var(--blue); }
    .conv-val.qual-color { color: var(--purple); }
    .conv-val.close-color { color: var(--green); }

    /* ── Loading / error ── */
    .loading { text-align: center; padding: 60px 0; color: var(--muted); }
    .error-box { background: #fef2f2; color: #ef4444; border-radius: 12px; padding: 16px 20px; font-size: 0.875rem; margin-top: 20px; }

    .footer { text-align: center; margin-top: 40px; font-size: 0.75rem; color: var(--light); }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1 id="dash-title">Loading…</h1>
    <div class="header-meta" id="dash-meta"></div>
    <div class="header-nav">
      <a class="nav-link" href="archive.html">📁 Archive</a>
    </div>
  </div>

  <div id="dashboard-body">
    <div class="loading">Loading dashboard data…</div>
  </div>

  <div class="footer" id="dash-footer"></div>
</div>

<script>
// ── In-house funnels (must match Close funnel names exactly) ────────────────
const INHOUSE_FUNNELS = new Set([
  "YouTube","Meta Ads","VSL","Website","Internal Webinar",
  "Mike Newsletter","TikTok","Side Hustle Nation","WWWS",
  "Passivepreneurs","Reactivation Email","Reactivation Scrapers"
]);

// ── Utilities ─────────────────────────────────────────────────────────────────
function fmtNum(n) { return n == null ? "—" : Number(n).toLocaleString(); }
function pct(a, b) { return (b && b > 0) ? Math.min(100, Math.round(a / b * 100)) : 0; }
function fmtPct(a, b) { return b > 0 ? `${pct(a,b)}%` : "—"; }
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function statusInfo(booked, onPace, goal) {
  if (!goal) return { label:"No Goal",    badge:"badge-nogoal", fill:"fill-gray",  remCls:"col-muted" };
  if (booked >= goal)   return { label:"✓ Goal Hit", badge:"badge-hit",    fill:"fill-green", remCls:"col-green" };
  if (booked >= onPace) return { label:"On Pace",    badge:"badge-onpace", fill:"fill-blue",  remCls:"col-muted" };
  return                       { label:"Behind Pace",badge:"badge-behind", fill:"fill-amber", remCls:"col-amber" };
}

// ── Conversion row builder ────────────────────────────────────────────────────
function buildConvRow(data, wonCount) {
  const total     = data.total     || 0;
  const showed    = data.showed    || 0;
  const qualified = data.qualified || 0;
  const won       = wonCount       || 0;

  return `
    <div class="conv-row">
      <div class="conv-item">
        <div class="conv-lbl">Showed</div>
        <div><span class="conv-val show-color">${fmtNum(showed)}</span><span class="conv-sep">|</span><span class="conv-pct">${fmtPct(showed, total)}</span></div>
      </div>
      <div class="conv-item">
        <div class="conv-lbl">Qualified</div>
        <div><span class="conv-val qual-color">${fmtNum(qualified)}</span><span class="conv-sep">|</span><span class="conv-pct">${fmtPct(qualified, total)}</span></div>
      </div>
      <div class="conv-item" style="flex:1;padding-left:12px;border-left:0;">
        <div class="conv-lbl">Won *</div>
        <div><span class="conv-val close-color">${fmtNum(won)}</span><span class="conv-sep">|</span><span class="conv-pct">${fmtPct(won, total)}</span></div>
      </div>
    </div>`;
}

// ── Funnel card builders ──────────────────────────────────────────────────────
function buildFunnelCard(funnel, data, goal, onPace, wonCount) {
  const total    = data.total || 0;
  const overGoal = goal && total > goal;
  const status   = statusInfo(total, onPace, goal);
  const fillPct  = goal ? Math.min(100, Math.round(total / goal * 100)) : 100;
  const pacePct  = goal ? Math.min(98, Math.round(onPace / goal * 100)) : null;
  const remaining = goal ? Math.max(0, goal - total) : null;
  const remLabel  = overGoal ? `+${fmtNum(total - goal)}` : (remaining != null ? fmtNum(remaining) : "—");
  const remName   = overGoal ? "Over Goal" : "Remaining";
  const onPaceVal = goal ? fmtNum(onPace) : "—";
  const paceTickHtml = pacePct != null ? `<div class="pace-tick" style="left:${pacePct}%"></div>` : "";

  return `
    <div class="funnel-card">
      <div class="funnel-card-header">
        <div class="funnel-name">${escHtml(funnel)}</div>
        <span class="badge ${status.badge}">${status.label}</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-fill ${status.fill}" style="width:${fillPct}%"></div>
        ${paceTickHtml}
      </div>
      <div class="stats-row">
        <div class="stat">
          <div class="stat-lbl">MTD Booked</div>
          <div class="stat-val col-plain">${fmtNum(total)}</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">On-Pace</div>
          <div class="stat-val ${goal ? status.remCls : 'col-muted'}">${onPaceVal}</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">Goal</div>
          <div class="stat-val col-plain">${goal ? fmtNum(goal) : "—"}</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">${remName}</div>
          <div class="stat-val ${status.remCls}">${remLabel}</div>
        </div>
      </div>
      ${buildConvRow(data, wonCount)}
    </div>`;
}

function buildNoGoalCard(funnel, data, wonCount) {
  const total = data.total || 0;
  return `
    <div class="funnel-card">
      <div class="funnel-card-header">
        <div class="funnel-name">${escHtml(funnel)}</div>
        <span class="badge badge-nogoal">No Goal</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-fill fill-gray" style="width:100%"></div>
      </div>
      <div class="stats-row">
        <div class="stat"><div class="stat-lbl">MTD Booked</div><div class="stat-val col-plain">${fmtNum(total)}</div></div>
        <div class="stat"><div class="stat-lbl">On-Pace</div><div class="stat-val col-muted">—</div></div>
        <div class="stat"><div class="stat-lbl">Goal</div><div class="stat-val col-muted">—</div></div>
        <div class="stat"><div class="stat-lbl">Total</div><div class="stat-val col-plain">${fmtNum(total)}</div></div>
      </div>
      ${buildConvRow(data, wonCount)}
    </div>`;
}

// ── Main render ───────────────────────────────────────────────────────────────
async function loadAndRender() {
  let d;
  try {
    const resp = await fetch(`data.json?_=${Date.now()}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    d = await resp.json();
  } catch (e) {
    document.getElementById("dashboard-body").innerHTML =
      `<div class="error-box">Could not load dashboard data: ${e.message}</div>`;
    return;
  }

  // ── Header ────────────────────────────────────────────────────────────────
  const monthLabel = d.month_label || d.month || "";
  document.title   = `${monthLabel} Booked Calls`;
  document.getElementById("dash-title").textContent = `${monthLabel} Booked Calls`;

  const genDt   = new Date(d.generated_at);
  const timeStr = genDt.toLocaleString("en-US", { hour:"numeric", minute:"2-digit", hour12:true, timeZoneName:"short" });
  document.getElementById("dash-meta").innerHTML = `
    <span>Month-to-date</span><span class="sep">·</span>
    <span>Days 1–${d.day} of ${d.month_days}</span><span class="sep">·</span>
    <span>${genDt.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</span><span class="sep">·</span>
    <span>Updated ${timeStr}</span>`;

  // ── Summary data ──────────────────────────────────────────────────────────
  const s        = d.summary || {};
  const inhouse  = s.inhouse  || {};
  const external = s.external || {};
  const allTotal = (inhouse.total || 0) + (external.total || 0);

  // Row 1: pace tiles
  let html = `
    <div class="summary-strip">
      <div class="stat-card">
        <div class="label">MTD Booked</div>
        <div class="value val-blue">${fmtNum(s.mtd_booked)}</div>
        <div class="sub">vs ${fmtNum(s.total_goal)} goal</div>
      </div>
      <div class="stat-card">
        <div class="label">On-Pace</div>
        <div class="value val-blue">${fmtNum(s.on_pace)}</div>
        <div class="sub">expected by day ${d.day}</div>
      </div>
      <div class="stat-card">
        <div class="label">Remaining</div>
        <div class="value val-amber">${fmtNum(s.remaining)}</div>
        <div class="sub">to hit goal</div>
      </div>
      <div class="stat-card">
        <div class="label">EOM Projection</div>
        <div class="value val-green">${fmtNum(s.eom_projection)}</div>
        <div class="sub">at current pace</div>
      </div>
    </div>`;

  // Row 2: in-house / external / show / qualified / closed
  function rateRow(agg) {
    const ih = inhouse[agg]  || 0;
    const ex = external[agg] || 0;
    const tot = (inhouse.total || 0) + (external.total || 0);
    const ihT = inhouse.total  || 0;
    const exT = external.total || 0;
    return `
      <div class="rate-row">
        <div class="rate-item">IN <span>${fmtPct(ih, ihT)}</span></div>
        <div class="rate-divider"></div>
        <div class="rate-item">EX <span>${fmtPct(ex, exT)}</span></div>
      </div>`;
  }

  html += `
    <div class="summary-strip-2">
      <div class="stat-card-sm">
        <div class="label">In-House</div>
        <div class="value val-indigo">${fmtNum(inhouse.total)}</div>
        <div class="sub">${fmtPct(inhouse.total, allTotal)} of total</div>
      </div>
      <div class="stat-card-sm">
        <div class="label">External</div>
        <div class="value val-purple">${fmtNum(external.total)}</div>
        <div class="sub">${fmtPct(external.total, allTotal)} of total</div>
      </div>
      <div class="stat-card-sm">
        <div class="label">Show Rate</div>
        <div class="value val-blue">${fmtPct((inhouse.showed||0)+(external.showed||0), allTotal)}</div>
        ${rateRow("showed")}
      </div>
      <div class="stat-card-sm">
        <div class="label">Qualified Rate</div>
        <div class="value val-purple">${fmtPct((inhouse.qualified||0)+(external.qualified||0), allTotal)}</div>
        ${rateRow("qualified")}
      </div>
      <div class="stat-card-sm">
        <div class="label">Close Rate *</div>
        <div class="value val-green">${fmtPct(s.closed_won_mtd || 0, allTotal)}</div>
        <div class="sub">${fmtNum(s.closed_won_mtd)} won / ${fmtNum(allTotal)} booked</div>
      </div>
    </div>`;

  // ── Funnel cards ──────────────────────────────────────────────────────────
  const goals      = d.goals      || {};
  const byFunnel   = d.by_funnel  || {};
  const daysInMonth = d.month_days || 31;
  const daysElapsed = d.day        || 1;

  function funnelOnPace(goal) {
    return Math.round(goal * daysElapsed / daysInMonth);
  }

  const goalFunnels   = Object.keys(goals).sort((a,b) => (goals[b]||0) - (goals[a]||0));
  const noGoalFunnels = Object.keys(byFunnel)
    .filter(f => !goals[f] && (byFunnel[f]?.total || 0) > 0)
    .sort((a,b) => (byFunnel[b]?.total||0) - (byFunnel[a]?.total||0));

  const wonByFunnel = d.won_by_funnel || {};

  html += `<div class="section-label">First Calls — Goal-Tracked Funnels</div>`;
  for (const f of goalFunnels) {
    html += buildFunnelCard(f, byFunnel[f] || {total:0,showed:0,qualified:0}, goals[f], funnelOnPace(goals[f]), wonByFunnel[f] || 0);
  }
  if (!goalFunnels.length) {
    html += `<p style="color:var(--muted);font-size:.875rem;padding:8px 0">No goal-tracked funnels configured.</p>`;
  }

  if (noGoalFunnels.length > 0) {
    html += `<div class="section-label">First Calls — No-Goal Funnels</div>`;
    for (const f of noGoalFunnels) {
      html += buildNoGoalCard(f, byFunnel[f], wonByFunnel[f] || 0);
    }
  }

  document.getElementById("dashboard-body").innerHTML = html;
  document.getElementById("dash-footer").innerHTML =
    `Sales calls only &middot; Excludes Lost, Canceled, Outside US &middot; Refreshes every 15 min weekdays &middot; ${timeStr}<br>
    <span style="font-size:0.7rem;color:var(--light)">* Close Rate is calculated as MTD Closed/Won opportunities divided by total booked calls. It is intended to gauge relative funnel performance only and may not match the MTD close rate reported in other sources. Do not use this metric to evaluate individual sales performance.</span>`;
}

loadAndRender();
</script>
</body>
</html>
