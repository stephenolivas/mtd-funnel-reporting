<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTD Funnel Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --light: #9ca3af;
      --blue: #3b82f6;
      --blue-light: #eff6ff;
      --green: #22c55e;
      --green-light: #f0fdf4;
      --amber: #f59e0b;
      --amber-light: #fffbeb;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    }

    body {
      font-family: 'Figtree', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    .container { max-width: 720px; margin: 0 auto; }

    /* ── Header ── */
    .header { margin-bottom: 24px; }
    .header h1 { font-size: 1.75rem; font-weight: 800; color: var(--text); letter-spacing: -0.02em; }
    .header-meta {
      margin-top: 4px; font-size: 0.8125rem; color: var(--muted);
      display: flex; flex-wrap: wrap; gap: 0 6px; align-items: center;
    }
    .header-meta .sep { color: var(--border); }
    .header-nav { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
    .nav-link {
      font-size: 0.8rem; font-weight: 500; color: var(--blue);
      text-decoration: none; padding: 3px 10px;
      border: 1px solid #dbeafe; border-radius: 999px;
      background: var(--blue-light); transition: background 0.15s;
    }
    .nav-link:hover { background: #dbeafe; }

    /* ── Summary strip ── */
    .summary-strip {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 10px; margin-bottom: 20px;
    }
    @media (max-width: 560px) { .summary-strip { grid-template-columns: repeat(2, 1fr); } }

    .stat-card {
      background: var(--card); border-radius: 14px;
      padding: 14px 16px 12px; box-shadow: var(--shadow);
    }
    .stat-card .label {
      font-size: 0.6875rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--muted); margin-bottom: 4px;
    }
    .stat-card .value {
      font-size: 1.875rem; font-weight: 800; line-height: 1; letter-spacing: -0.02em;
    }
    .stat-card .sub { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .value-blue  { color: var(--blue); }
    .value-green { color: var(--green); }
    .value-amber { color: var(--amber); }

    /* ── Section header ── */
    .section-label {
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--muted); margin: 24px 0 10px;
    }

    /* ── Funnel card ── */
    .funnel-card {
      background: var(--card); border-radius: 16px;
      padding: 18px 20px 16px; box-shadow: var(--shadow); margin-bottom: 10px;
    }
    .funnel-card-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 2px; gap: 8px;
    }
    .funnel-name { font-size: 1rem; font-weight: 700; color: var(--text); }
    .funnel-sub  { font-size: 0.75rem; color: var(--light); margin-top: 2px; }

    /* ── Badges ── */
    .badge {
      flex-shrink: 0; font-size: 0.6875rem; font-weight: 700;
      padding: 3px 10px; border-radius: 999px; white-space: nowrap;
    }
    .badge-behind { background: var(--amber-light); color: #92400e; }
    .badge-onpace { background: var(--blue-light);  color: #1d4ed8; }
    .badge-hit    { background: var(--green-light); color: #15803d; }
    .badge-nogoal { background: #f3f4f6; color: var(--muted); }

    /* ── Progress bar ── */
    .progress-wrap {
      position: relative; height: 8px; background: #f3f4f6;
      border-radius: 999px; margin: 10px 0 12px; overflow: visible;
    }
    .progress-fill {
      height: 100%; border-radius: 999px; transition: width 0.4s ease; min-width: 4px;
    }
    .progress-fill-blue  { background: var(--blue); }
    .progress-fill-green { background: var(--green); }
    .progress-fill-amber { background: var(--amber); }
    .progress-fill-gray  { background: #d1d5db; }

    /* Pace tick mark */
    .pace-tick {
      position: absolute; top: -3px; width: 2px; height: 14px;
      background: #9ca3af; border-radius: 1px; transform: translateX(-50%);
    }

    /* ── Stats row ── */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
    .stats-row .stat { text-align: left; }
    .stats-row .stat-lbl {
      font-size: 0.6875rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--muted); margin-bottom: 1px;
    }
    .stats-row .stat-val {
      font-size: 1.25rem; font-weight: 800; letter-spacing: -0.01em; line-height: 1.1;
    }
    .stats-row .stat-val.col-amber { color: var(--amber); }
    .stats-row .stat-val.col-blue  { color: var(--blue); }
    .stats-row .stat-val.col-green { color: var(--green); }
    .stats-row .stat-val.col-muted { color: var(--muted); }
    .stats-row .stat-val.col-plain { color: var(--text); }

    /* ── Loading / error ── */
    .loading { text-align: center; padding: 60px 0; color: var(--muted); font-size: 0.9375rem; }
    .error-box {
      background: #fef2f2; color: #ef4444;
      border-radius: 12px; padding: 16px 20px; font-size: 0.875rem; margin-top: 20px;
    }

    .footer {
      text-align: center; margin-top: 40px;
      font-size: 0.75rem; color: var(--light);
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1 id="dash-title">Loading…</h1>
    <div class="header-meta" id="dash-meta"></div>
    <div class="header-nav">
      <a class="nav-link" href="archive.html">📁 Archive</a>
    </div>
  </div>

  <div id="dashboard-body">
    <div class="loading">Loading dashboard data…</div>
  </div>

  <div class="footer" id="dash-footer"></div>
</div>

<script>
function fmtNum(n) { return n == null ? "—" : Number(n).toLocaleString(); }
function pct(a, b) { return b ? Math.min(100, Math.round(a / b * 100)) : 0; }
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function statusInfo(booked, onPace, goal) {
  if (!goal) return { label: "No Goal",    cls: "badge-nogoal", fillCls: "progress-fill-gray",  remCls: "col-muted" };
  if (booked >= goal) return { label: "✓ Goal Hit", cls: "badge-hit",    fillCls: "progress-fill-green", remCls: "col-green" };
  if (booked >= onPace) return { label: "On Pace",   cls: "badge-onpace", fillCls: "progress-fill-blue",  remCls: "col-muted" };
  return { label: "Behind Pace", cls: "badge-behind", fillCls: "progress-fill-amber", remCls: "col-amber" };
}

function buildFunnelCard(funnel, data, goal, onPace) {
  const total     = data.total  || 0;
  const sales     = data.sales  || 0;
  const setter    = data.setter || 0;
  const remaining = goal ? Math.max(0, goal - total) : null;
  const overGoal  = goal && total > goal;
  const status    = statusInfo(total, onPace, goal);
  const fillPct   = goal ? pct(total, goal) : 100;
  const pacePct   = goal ? pct(onPace, goal) : null;

  const paceTickHtml = pacePct != null
    ? `<div class="pace-tick" style="left:${Math.min(98, pacePct)}%"></div>` : "";

  const remLabel    = overGoal ? `+${fmtNum(total - goal)}` : (remaining != null ? fmtNum(remaining) : "—");
  const remStatName = overGoal ? "Over Goal" : "Remaining";
  const onPaceVal   = goal ? fmtNum(onPace) : "—";
  const onPaceCls   = goal ? status.remCls : "col-muted";

  return `
    <div class="funnel-card">
      <div class="funnel-card-header">
        <div>
          <div class="funnel-name">${escHtml(funnel)}</div>
          <div class="funnel-sub">Sales ${fmtNum(sales)} / Setter ${fmtNum(setter)}</div>
        </div>
        <span class="badge ${status.cls}">${status.label}</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-fill ${status.fillCls}" style="width:${fillPct}%"></div>
        ${paceTickHtml}
      </div>
      <div class="stats-row">
        <div class="stat">
          <div class="stat-lbl">MTD Booked</div>
          <div class="stat-val col-plain">${fmtNum(total)}</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">On-Pace</div>
          <div class="stat-val ${onPaceCls}">${onPaceVal}</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">Goal</div>
          <div class="stat-val col-plain">${goal ? fmtNum(goal) : "—"}</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">${remStatName}</div>
          <div class="stat-val ${status.remCls}">${remLabel}</div>
        </div>
      </div>
    </div>`;
}

function buildNoGoalCard(funnel, data) {
  const total  = data.total  || 0;
  const sales  = data.sales  || 0;
  const setter = data.setter || 0;
  return `
    <div class="funnel-card">
      <div class="funnel-card-header">
        <div>
          <div class="funnel-name">${escHtml(funnel)}</div>
          <div class="funnel-sub">Sales ${fmtNum(sales)} / Setter ${fmtNum(setter)}</div>
        </div>
        <span class="badge badge-nogoal">No Goal</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-fill progress-fill-gray" style="width:100%"></div>
      </div>
      <div class="stats-row" style="grid-template-columns:1fr 1fr 1fr;">
        <div class="stat">
          <div class="stat-lbl">MTD Booked</div>
          <div class="stat-val col-plain">${fmtNum(total)}</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">Sales</div>
          <div class="stat-val col-plain">${fmtNum(sales)}</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">Setter</div>
          <div class="stat-val col-plain">${fmtNum(setter)}</div>
        </div>
      </div>
    </div>`;
}

async function loadAndRender() {
  let d;
  try {
    const resp = await fetch(`data.json?_=${Date.now()}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    d = await resp.json();
  } catch (e) {
    document.getElementById("dashboard-body").innerHTML =
      `<div class="error-box">Could not load dashboard data: ${e.message}</div>`;
    return;
  }

  // ── Header ────────────────────────────────────────────────────────────────
  const monthLabel = d.month_label || d.month || "";
  document.title = `${monthLabel} Booked Calls`;
  document.getElementById("dash-title").textContent = `${monthLabel} Booked Calls`;

  const genDt  = new Date(d.generated_at);
  const timeStr = genDt.toLocaleString("en-US", {
    hour: "numeric", minute: "2-digit", hour12: true, timeZoneName: "short"
  });
  document.getElementById("dash-meta").innerHTML = `
    <span>Month-to-date</span>
    <span class="sep">·</span>
    <span>Days 1–${d.day} of ${d.month_days}</span>
    <span class="sep">·</span>
    <span>${genDt.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</span>
    <span class="sep">·</span>
    <span>Updated ${timeStr}</span>`;

  // ── Summary strip ─────────────────────────────────────────────────────────
  const s = d.summary || {};
  let html = `
    <div class="summary-strip">
      <div class="stat-card">
        <div class="label">MTD Booked</div>
        <div class="value value-blue">${fmtNum(s.mtd_booked)}</div>
        <div class="sub">vs ${fmtNum(s.total_goal)} goal</div>
      </div>
      <div class="stat-card">
        <div class="label">On-Pace</div>
        <div class="value value-blue">${fmtNum(s.on_pace)}</div>
        <div class="sub">expected by day ${d.day}</div>
      </div>
      <div class="stat-card">
        <div class="label">Remaining</div>
        <div class="value value-amber">${fmtNum(s.remaining)}</div>
        <div class="sub">to hit goal</div>
      </div>
      <div class="stat-card">
        <div class="label">EOM Projection</div>
        <div class="value value-green">${fmtNum(s.eom_projection)}</div>
        <div class="sub">at current pace</div>
      </div>
    </div>`;

  // ── Funnel cards ──────────────────────────────────────────────────────────
  const goals     = d.goals     || {};
  const byFunnel  = d.by_funnel || {};

  const daysInMonth = d.month_days || 31;
  const daysElapsed = d.day || 1;

  function funnelOnPace(goal) {
    return Math.round(goal * daysElapsed / daysInMonth);
  }

  // Split into goal-tracked vs no-goal
  const goalFunnels   = [];
  const noGoalFunnels = [];

  // Goal funnels: include even if 0 bookings
  for (const f of Object.keys(goals)) {
    if (!goalFunnels.includes(f)) goalFunnels.push(f);
  }
  // No-goal funnels: only if they have bookings
  for (const f of Object.keys(byFunnel)) {
    if (!goals[f] && (byFunnel[f]?.total || 0) > 0) noGoalFunnels.push(f);
  }

  // Sort goal funnels by goal size desc
  goalFunnels.sort((a, b) => (goals[b] || 0) - (goals[a] || 0));
  // Sort no-goal funnels by total desc
  noGoalFunnels.sort((a, b) => ((byFunnel[b]?.total || 0) - (byFunnel[a]?.total || 0)));

  // Goal-tracked section
  html += `<div class="section-label">First Calls — Goal-Tracked Funnels</div>`;
  for (const f of goalFunnels) {
    html += buildFunnelCard(f, byFunnel[f] || {total:0,sales:0,setter:0}, goals[f], funnelOnPace(goals[f]));
  }
  if (!goalFunnels.length) {
    html += `<p style="color:var(--muted);font-size:.875rem;padding:8px 0">No goal-tracked funnels configured.</p>`;
  }

  // No-goal section
  if (noGoalFunnels.length > 0) {
    html += `<div class="section-label">First Calls — No-Goal Funnels</div>`;
    for (const f of noGoalFunnels) {
      html += buildNoGoalCard(f, byFunnel[f]);
    }
  }

  document.getElementById("dashboard-body").innerHTML = html;
  document.getElementById("dash-footer").textContent =
    `Data from Close CRM · Refreshes every 15 min weekdays · ${timeStr}`;
}

loadAndRender();
</script>
</body>
</html>
